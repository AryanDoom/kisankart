<!DOCTYPE html>
<html>

<head>
    <title>Demo Payment Gateway - KissanKart</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            margin-top: 80px;
            background-color: #f5f5f5;
        }

        .box {
            background: white;
            padding: 40px;
            width: 400px;
            margin: auto;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        button {
            padding: 12px 24px;
            background: #2ecc71;
            color: white;
            border: none;
            cursor: pointer;
            margin-top: 20px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            transition: background 0.3s;
        }

        button:hover {
            background: #27ae60;
        }

        input {
            padding: 12px;
            width: 90%;
            margin-top: 15px;
            text-align: center;
            font-size: 18px;
            border: 1px solid #ddd;
            border-radius: 6px;
        }

        .hidden {
            display: none;
        }

        .success {
            color: #27ae60;
            font-size: 24px;
            margin-bottom: 20px;
        }

        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #2ecc71;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        hr {
            border: 0;
            border-top: 1px solid #eee;
            margin: 20px 0;
        }
    </style>
</head>

<body>

    <div class="box">
        <div id="payment-content">
            <h2 style="color: #2e7d32;">KissanKart Secure Payment</h2>
            <p class="text-muted">Direct From Farm to Your Home</p>
            <hr>

            <!-- STEP 1: ENTER AMOUNT -->
            <div id="step1">
                <p>Total Payment Amount (₹)</p>
                <input type="number" id="amountInput" value="{{ total }}" readonly>
                <br>
                <button onclick="goToPin()">Confirm Amount</button>
                <p style="margin-top: 15px;"><a href="{{ url_for('view_cart') }}"
                        style="color: #777; text-decoration: none; font-size: 14px;">Cancel and Return</a></p>
            </div>

            <!-- STEP 2: ENTER PIN -->
            <div id="step2" class="hidden">
                <h3>Enter UPI PIN</h3>
                <p style="font-size: 14px; color: #666;">Paying ₹{{ total }} to KissanKart</p>
                <input type="password" id="pinInput" maxlength="6" placeholder="Enter 6-digit PIN" autofocus>
                <br>
                <button onclick="processPayment()">Pay Securely</button>
            </div>

            <!-- STEP 3: STATUS -->
            <div id="status" class="hidden">
                <div class="loader"></div>
                <h3>Processing Payment...</h3>
            </div>

            <!-- STEP 4: SUCCESS & FINAL REDIRECT -->
            <div id="success-message" class="hidden">
                <h3 class="success">Payment Successful ✅</h3>
                <div id="txn-details"
                    style="text-align: left; font-size: 14px; background: #f9f9f9; padding: 15px; border-radius: 8px;">
                    <!-- Filled via JS -->
                </div>
                <form action="{{ url_for('checkout') }}" method="POST">
                    <button type="submit">Place Order & Return to Shop</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        let enteredAmount = "{{ total }}";

        function generateOrderId() { return "order_" + Math.random().toString(36).substring(2, 12).toUpperCase(); }
        function generatePaymentId() { return "pay_" + Math.random().toString(36).substring(2, 12).toUpperCase(); }
        function generateTxnId() { return "TXN" + Math.floor(Math.random() * 1000000000); }

        function goToPin() {
            document.getElementById("step1").classList.add("hidden");
            document.getElementById("step2").classList.remove("hidden");
            document.getElementById("pinInput").focus();
        }

        function processPayment() {
            let pin = document.getElementById("pinInput").value;

            if (pin.length < 4) {
                alert("Please enter a valid PIN");
                return;
            }

            document.getElementById("step2").classList.add("hidden");
            document.getElementById("status").classList.remove("hidden");

            setTimeout(() => {
                let orderId = generateOrderId();
                let paymentId = generatePaymentId();
                let txnId = generateTxnId();
                let date = new Date().toLocaleString();

                document.getElementById("status").classList.add("hidden");
                document.getElementById("success-message").classList.remove("hidden");

                document.getElementById("txn-details").innerHTML = `
            <p><b>Amount Paid:</b> ₹${enteredAmount}</p>
            <p><b>Order ID:</b> ${orderId}</p>
            <p><b>Payment ID:</b> ${paymentId}</p>
            <p><b>Transaction ID:</b> ${txnId}</p>
            <p><b>Date:</b> ${date}</p>
        `;
            }, 2500);
        }
    </script>

</body>

</html>
